name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Run Tests
        run: go test -v -race ./...

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Build matrix: OS x Arch
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" = "windows" ]; then ext=".exe"; fi
              echo "Building for $os/$arch..."
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -trimpath -o "dist/vexil-${os}-${arch}${ext}" ./cmd/vexil
            done
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
