name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test & Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        check-latest: true
        
    - name: Ensure Dependencies
      run: go mod download

    - name: Run Build
      run: go build -v ./...

    - name: Run Unit Tests
      run: go test -v -race ./...

    - name: Static Analysis (Vet)
      run: go vet ./...
      
    - name: Self-Scan for Hardcoded Secrets
      run: |
        go build -o vexil cmd/vexil/main.go
        ./vexil -dir . -exclude=internal,testdata,doc,VEX.wiki
